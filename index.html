<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--fondo:#f2f1ee;
--marco:#d6d4cf;
--amarillo:#f4e7a3;
--gris-texto:#4a4a4a;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:var(--fondo);
color:var(--gris-texto);
overflow-x:hidden;
}

/* textura papel */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(0,0,0,0.02) 0%, transparent 60%),
radial-gradient(circle at 80% 80%, rgba(0,0,0,0.02) 0%, transparent 60%);
pointer-events:none;
z-index:-1;
}

/* marco doble */
.wrapper{
margin:40px;
border:1px solid var(--marco);
padding:20px;
position:relative;
}

.wrapper::after{
content:"";
position:absolute;
inset:10px;
border:1px solid var(--marco);
pointer-events:none;
}

/* estrellas */
.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:var(--amarillo);
border-radius:50%;
opacity:0.6;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px) translateX(0);opacity:0}
20%{opacity:1}
100%{transform:translateY(100vh) translateX(20px);opacity:0}
}

/* secciones */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:60px 20px;
text-align:center;
position:relative;
z-index:1;
}

.fade-section{
opacity:0;
transform:translateY(40px);
transition:all 1.2s ease;
}

.fade-section.visible{
opacity:1;
transform:translateY(0);
}

/* primera pantalla */
.hero h1{
font-size:3.5rem;
font-weight:600;
color:var(--gris-texto);
transition:color 1s ease;
}

.hero h1.reveal{
color:var(--amarillo);
}

.hero h1 span{
font-style:italic;
font-weight:400;
}

.hero p{
font-size:1.6rem;
max-width:700px;
margin-top:30px;
line-height:1.6;
}

.flecha{
margin-top:40px;
font-size:2rem;
cursor:pointer;
color:var(--amarillo);
animation:down 2s infinite;
}

@keyframes down{
0%{transform:translateY(0)}
50%{transform:translateY(10px)}
100%{transform:translateY(0)}
}

/* polaroids */
.polaroid-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
padding:60px 20px;
}

.polaroid{
background:white;
padding:15px 15px 60px 15px;
width:200px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transform:rotate(-3deg) scale(0.9);
opacity:0;
transition:all 1s ease;
cursor:pointer;
position:relative;
}

.polaroid img{
width:100%;
}

.polaroid.show{
opacity:1;
transform:rotate(0deg) scale(1);
}

.polaroid:hover{
transform:rotate(0deg) scale(1.05);
}

/* carta */
#textoCarta{
max-width:800px;
text-align:justify;
line-height:1.8;
font-size:1.1rem;
white-space:pre-line;
}

/* playlist */
.playlist-frase{
font-size:1.3rem;
margin-bottom:30px;
}

/* mensajes secretos */
.secret{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.9);
padding:10px 20px;
border-radius:20px;
font-size:0.9rem;
opacity:0;
transition:opacity 0.5s ease;
}

.secret.show{
opacity:1;
}

.highlight{
color:var(--amarillo);
}

.fecha{
position:absolute;
bottom:10px;
right:20px;
font-size:0.7rem;
opacity:0.4;
transition:opacity 0.3s ease;
}

.fecha:hover{
opacity:1;
color:var(--amarillo);
}

</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<audio id="typeSound">
<source src="type.mp3" type="audio/mpeg">
</audio>

<div class="stars"></div>

<div class="wrapper">

<section class="hero fade-section">
<h1 id="luz">Luz, <span>eres tú</span></h1>
<p>
Algo comenzó un 9 de febrero de 2025…<br>
pero el tiempo necesitó su propio ritmo<br>
para que hoy pudiera celebrarte<br>
como siempre mereciste.
</p>
<div class="flecha" onclick="scrollToSection('fotos')">↓</div>
</section>

<section id="fotos" class="fade-section">
<div class="polaroid-container">
<div class="polaroid"><img src="foto1.jpg"></div>
<div class="polaroid"><img src="foto2.jpg"></div>
<div class="polaroid"><img src="foto3.jpg"></div>
<div class="polaroid especial"><img src="foto4.jpg"></div>
<div class="polaroid"><img src="foto5.jpg"></div>
<div class="polaroid"><img src="foto6.jpg"></div>
<div class="polaroid"><img src="foto7.jpg"></div>
<div class="polaroid"><img src="foto8.jpg"></div>
<div class="polaroid"><img src="foto9.jpg"></div>
<div class="polaroid"><img src="foto10.jpg"></div>
</div>
<div class="flecha" onclick="scrollToSection('carta')">↓</div>
</section>

<section id="carta" class="fade-section">
<div id="textoCarta"></div>
<div class="flecha" onclick="scrollToSection('playlist')">↓</div>
</section>

<section id="playlist" class="fade-section">
<div class="playlist-frase">
Para que incluso el ruido encuentre <span class="highlight">refugio</span>.
</div>
<iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/TU_PLAYLIST" width="300" height="380" frameBorder="0" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
</section>

<div class="fecha">09•02•2025</div>

</div>

<div id="secretMessage" class="secret"></div>

<script>

/* estrellas */
for(let i=0;i<35;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"%";
star.style.animationDuration=(6+Math.random()*6)+"s";
document.querySelector(".stars").appendChild(star);
}

/* scroll */
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* música */
let musicStarted=false;
document.addEventListener("click",()=>{
if(!musicStarted){
document.getElementById("bgMusic").volume=0.4;
document.getElementById("bgMusic").play();
musicStarted=true;
}
});

/* fade */
const faders=document.querySelectorAll(".fade-section");
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("visible");
}
});
},{threshold:0.2});
faders.forEach(f=>observer.observe(f));

/* revelar luz */
document.addEventListener("click",()=>{
document.getElementById("luz").classList.add("reveal");
},{once:true});

/* polaroids animadas */
document.querySelectorAll(".polaroid").forEach(p=>{
observer.observe(p);
});

/* carta */
let cartaEscrita=false;
const texto=`Hola, vida linda.

Hoy cumplo mi pequeño propósito: aportar un granito de luz para que tu cumpleaños número veintiséis sea tan especial como tú.

Este espacio es un recordatorio de lo que significas en mi vida, del lugar inmenso que ocupas en mi corazón y de mi intención constante de que nunca olvides cuánto mereces. Estoy profundamente orgullosa de ti: de lo que has logrado, de la persona que eres, del ejemplo que representas para quienes te rodean. Eres luz en mi vida, y desde el primer día quise que lo supieras.

Ojalá, si vuelves aquí en una semana, en un mes o en un año, recuerdes que siempre debes rodearte de personas que te celebren y te valoren. Nunca aceptes lo mínimo. No naciste para lo básico. Eres extraordinaria y mereces una vida extraordinaria.

Te quiero, te admiro, te amo. Y mientras la vida me lo permita, quiero estar para ti.

Feliz cumpleaños a todas tus versiones.
En esta dimensión y en todas las que existan.

— C.`;

function escribir(){
let i=0;
function maquina(){
if(i<texto.length){
document.getElementById("textoCarta").textContent+=texto.charAt(i);
document.getElementById("typeSound").currentTime=0;
document.getElementById("typeSound").play();
i++;
setTimeout(maquina,25);
}
}
maquina();
}

new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting && !cartaEscrita){
cartaEscrita=true;
escribir();
}
});
},{threshold:0.4}).observe(document.getElementById("carta"));

/* secretos */
function showSecret(text){
let box=document.getElementById("secretMessage");
box.innerHTML=text;
box.classList.add("show");
setTimeout(()=>box.classList.remove("show"),4000);
}

/* triple click luz */
let clicks=0;
document.getElementById("luz").addEventListener("click",()=>{
clicks++;
if(clicks===3){
showSecret(`Siempre supe que eras <span class="highlight">tú</span>.`);
clicks=0;
}
});

/* polaroid especial */
document.querySelector(".especial").addEventListener("click",()=>{
showSecret(`Aquí empezó a sentirse <span class="highlight">hogar</span>.`);
});

/* seleccionar extraordinaria */
document.addEventListener("mouseup",()=>{
if(window.getSelection().toString().includes("extraordinaria")){
showSecret(`Y todavía no dimensionas cuánto <span class="highlight">iluminas</span>.`);
}
});

/* doble click playlist */
document.querySelector(".playlist-frase").addEventListener("dblclick",()=>{
showSecret(`Incluso el ruido encuentra <span class="highlight">refugio</span> en ti.`);
});

/* escribir 5 teclas */
let keyCount=0;
document.addEventListener("keydown",()=>{
keyCount++;
if(keyCount===5){
showSecret(`La respuesta siempre fue <span class="highlight">refugio</span>.`);
keyCount=0;
}
});

/* mantener presionado */
let pressTimer;
document.addEventListener("mousedown",()=>{
pressTimer=setTimeout(()=>{
showSecret(`El mundo baja la voz cuando aparece tu <span class="highlight">luz</span>.`);
},4000);
});
document.addEventListener("mouseup",()=>clearTimeout(pressTimer));

</script>

</body>
</html>
