<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luz - Página Final (Provisional)</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { font-family:'Inter',sans-serif; background:#f6f1e8; color:#111; overflow-x:hidden; }

.wrapper {
  border: double 4px #cfcfcf;
  margin:20px; padding:40px 20px;
}

section {
  min-height:100vh; display:flex; flex-direction:column;
  justify-content:center; align-items:center; opacity:1; transform:translateY(0);
  transition:all 1s ease; text-align:center; position:relative;
}

h1 { font-family:'Playfair Display', serif; font-size:4rem; font-weight:700; }
.luz span { font-style:italic; font-weight:300; }
.frase { font-family:'Playfair Display', serif; font-size:2.2rem; max-width:900px; line-height:1.5; margin-top:40px; }
.arrow { margin-top:60px; font-size:2rem; cursor:pointer; color:#c9a227; animation:bounce 2s infinite; }
@keyframes bounce { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(10px); } }

.polaroids {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:40px; margin-top:60px; justify-items:center;
}
.polaroid {
  width:220px; background:#fff; padding:15px 15px 40px 15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  transform:rotate(calc(var(--r)*1deg)) translateY(40px);
  opacity:0;
  transition:all 0.8s ease;
}
.polaroid.show { opacity:1; transform:rotate(calc(var(--r)*1deg)) translateY(0); }
.polaroid img { width:100%; display:block; }
.polaroid:hover { transform:scale(1.05) rotate(0deg); }

.carta {
  max-width:800px; text-align:justify; font-size:1.1rem; line-height:1.8;
  white-space:pre-wrap; border-right:2px solid #c9a227; padding-right:10px; margin-top:50px;
}

.playlist { text-align:center; margin-top:80px; }
.playlist h2 { margin-bottom:40px; font-size:28px; font-weight:400; font-family:'Playfair Display',serif; }
.playlist iframe { border-radius:12px; width:100%; max-width:600px; height:380px; }

</style>
</head>

<body>

<div id="mainContent" class="wrapper">

  <section id="inicio">
    <h1 class="luz"><strong>Luz</strong> <span>eres tú</span></h1>
    <div class="frase">
      Algo comenzó un 9 de febrero de 2025…<br>
      pero el tiempo necesitó su propio ritmo<br>
      para que hoy pudiera celebrarte<br>
      como siempre mereciste.
    </div>
    <div class="arrow" onclick="scrollToSection('fotos')">↓</div>
  </section>

  <section id="fotos">
    <div class="polaroids" id="polaroidContainer"></div>
    <div class="arrow" onclick="scrollToSection('cartaSection')">↓</div>
  </section>

  <section id="cartaSection">
    <div id="carta" class="carta"></div>
    <div class="arrow" onclick="scrollToSection('musica')">↓</div>
  </section>

  <section id="musica" class="playlist">
    <h2>Nuestra música</h2>
    <iframe src="https://open.spotify.com/embed/playlist/2YTA58o94wbbxc3rWefPfE" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
  </section>

</div>

<script>
// SCROLL
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// POLAROIDS
const polaroidContainer = document.getElementById("polaroidContainer");
for(let i=1;i<=33;i++){
  let div = document.createElement("div");
  div.className="polaroid";
  div.style.setProperty("--r",Math.floor(Math.random()*6-3));
  div.innerHTML = `<img src="img/${String(i).padStart(2,'0')}.jpg">`;
  polaroidContainer.appendChild(div);
}

// Animación polaroids al cargar
function revealPolaroids(){
  const polaroids = document.querySelectorAll(".polaroid");
  const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add("show");
      }
    });
  },{threshold:0.2});
  polaroids.forEach(p=>observer.observe(p));
}
revealPolaroids();

// CARTA TYPEWRITER
const texto=`Hola, vida linda.

Cumpliendo con mi propósito de aportar un pequeño granito de arena para que tu cumpleaños número veintiséis sea especial, hoy te entrego este espacio como recordatorio de lo que significas en mi vida, del lugar que ocupas y de mi deseo constante de que recuerdes que mereces todo lo hermoso que das.

No me cansaré nunca de decir que estoy profundamente orgullosa de ti. Eres un ser humano admirable, un ejemplo silencioso de fortaleza, ternura y determinación. Eres luz en mi vida, y desde el primer día quise que lo supieras.

Deseo que, si algún día vuelves aquí —en una semana, en un mes o en un año— recuerdes rodearte siempre de personas que te celebren como yo te celebro hoy. No aceptes lo mínimo. No mereces nada básico. Eres extraordinaria, y solo cosas extraordinarias deberían encontrarte.

Te quiero, te admiro y te amo. Y mientras la vida me lo permita, quiero apoyarte, cuidarte, mimarte y acompañarte incluso en tus caprichos, ideas locas y ocurrencias inesperadas.

Feliz cumpleaños a la Catalina con botitas rojas.
Feliz cumpleaños a la Catalina de los pucheros fotografiados.
Feliz cumpleaños a la Catalina que llegaba tarde al colegio y aun así seguía brillando.
Feliz cumpleaños a la Catalina que repitió tres veces el mismo año y jamás dejó que eso definiera su valor.
Feliz cumpleaños a la Catalina que resistió no una, sino tres decepciones amorosas.
Feliz cumpleaños a la Catalina que fue poliamada sin merecer confusión.
Feliz cumpleaños a la Catalina que intentaron usar y aun así siguió creyendo en el amor.
Feliz cumpleaños a la Catalina que se tinturó el cabello para cerrar ciclos.
Feliz cumpleaños a la Catalina que tuvo su primera borrachera en casa.
Feliz cumpleaños a la Catalina que atravesó injusticias que nunca debieron tocarla.
Feliz cumpleaños a la Catalina que hizo su tesis con su ex (sí, esa misma).
Feliz cumpleaños a la Catalina que eligió convertir a Sarhy e Isabella en hermanas de vida.
Feliz cumpleaños a la Catalina que necesitó el apoyo del mundo cuando su papá partió a Estados Unidos.
Feliz cumpleaños a la Catalina que lloró cuando Vainilla se volvió una estrella.
Feliz cumpleaños a la Catalina que conocí hace más de un año en un lugar inesperado.
Feliz cumpleaños a la Catalina que habla con perritos y me enamora con eso.
Feliz cumpleaños a la Catalina que me desespera diez minutos explicando algo que podría explicar en dos.
Feliz cumpleaños a la Catalina de los audios infinitos.
Feliz cumpleaños a la Catalina de las selfies espontáneas.
Feliz cumpleaños a la Catalina que comenta hasta el más mínimo detalle que le comparto.

Y, sobre todo, feliz cumpleaños a todas las Catalinas que existen en este universo y en todas las dimensiones posibles.

Gracias por ser refugio.
Gracias por ser luz.
Gracias por ser hogar.`;

let i=0;
const carta = document.getElementById("carta");
function typeWriter(){
  if(i<texto.length){
    carta.innerHTML += texto.charAt(i);
    i++;
    setTimeout(typeWriter,25);
  }
}
typeWriter();
</script>

</body>
</html>
