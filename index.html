<style>

html {
  scroll-behavior: smooth;
}

body {
  margin:0;
  background:#f4f4f2;
  font-family:'Inter', sans-serif;
  color:#333;
  overflow-x:hidden;
  background-image: radial-gradient(rgba(0,0,0,0.015) 1px, transparent 1px);
  background-size: 3px 3px;
}

.wrapper {
  border: double 4px #cfcfcf;
  margin:20px;
  padding:40px 20px;
}

section {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  transform:translateY(40px);
  transition:all 1s ease;
  text-align:center;
  position:relative;
}

section.visible {
  opacity:1;
  transform:translateY(0);
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:4rem;
  margin:0;
}

.luz span {

}

.frase {

  font-size:2.2rem;

  line-height:1.5;

}

.arrow {
  margin-top:60px;
  font-size:2rem;
  cursor:pointer;
  animation:bounce 2s infinite;
  color:#c9a227;
}

@keyframes bounce {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(10px); }
}

/* POLAROIDS */

.polaroids {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
  max-width:1000px;
}

.polaroid {
  width:200px;
  max-width:90vw;
  background:white;
  padding:20px 20px 60px 20px;
  box-shadow:0 12px 30px rgba(0,0,0,0.12);
  transform:rotate(calc(-5deg + 10deg * var(--r)));
  transition:transform 0.5s ease;
  object-position: 50% 30%;
}

.polaroid img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}
  .special img {
  object-position: 50% 20%;
}
  
.polaroid:hover {
  transform:scale(1.05) rotate(0deg);
}
  .extra {
  display:none;
  opacity:0;
  transform:translateY(20px);
  transition:all 0.6s ease;
}

.extra.show {
  display:block;
  opacity:1;
  transform:translateY(0);
}

.ver-mas-btn {
  margin-top:50px;
  padding:12px 28px;
  border:1px solid #c9a227;
  background:transparent;
  font-family:'Playfair Display', serif;
  font-size:1rem;
  cursor:pointer;
  transition:all 0.3s ease;
}

.ver-mas-btn:hover {
  background:#c9a227;
  color:white;
}

  
/* CARTA */

.carta {
  max-width:800px;
  text-align:justify;
  font-size:1.1rem;
  line-height:1.8;
  white-space:pre-wrap;
  border-right:2px solid #c9a227;
  padding-right:10px;
}

/* ESTRELLAS */

.star {
  position:fixed;
  width:2px;
  height:60px;
  background:linear-gradient(to bottom, rgba(255,215,0,0.7), transparent);
  opacity:0.4;
  animation:fall linear infinite;
}

@keyframes fall {
  from { transform:translateY(-100px) translateX(0); }
  to { transform:translateY(100vh) translateX(-50px); }
}

  .spotify {
  width:100%;
  max-width:700px;
  margin-top:50px;
}

.spotify iframe {
  box-shadow:0 20px 50px rgba(0,0,0,0.12);
  transition:transform 0.4s ease;
}

.spotify iframe:hover {
  transform:scale(1.02);
}

  .countdowns {
  display:flex;
  flex-direction:column;
  gap:35px;
  align-items:center;
}

.countBox {
  background:white;
  padding:25px 50px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  border-radius:12px;
  min-width:280px;
  transition:transform 0.3s ease;
}

.countBox:hover {
  transform:translateY(-5px);
}

.countBox h3 {
  margin-bottom:10px;

#loveButton {

#loveButton:hover {

#loveMessage {

  font-family:'Playfair Display', serif;
  min-height:35px;
  opacity:0;
  transform:translateY(10px);

}

#loveMessage.show {

  transform:translateY(0);

.morat-mini img:nth-child(2) {

}

.morat-mini img:nth-child(3) {

}

.morat-mini img:hover {

</style>
</head>

<script>

/* SCROLL */
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* FADE IN SECTIONS */
const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
  sections.forEach(sec=>{
    const rect=sec.getBoundingClientRect();
    if(rect.top<window.innerHeight-100){
      sec.classList.add("visible");
    }
  });
});

/* ESTRELLAS */
for(let i=0;i<20;i++){
  let star=document.createElement("div");
  star.classList.add("star");
  star.style.left=Math.random()*100+"%";
  star.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(star);
}

/* CARTA TYPEWRITER */

const texto=`Hola, vida linda.

Cumpliendo con mi propósito de aportar un pequeño granito de arena para que tu cumpleaños número veintiséis sea especial, hoy te entrego este espacio como recordatorio de lo que significas en mi vida, del lugar que ocupas y de mi deseo constante de que recuerdes que mereces todo lo hermoso que das.

No me cansaré nunca de decir que estoy profundamente orgullosa de ti. Eres un ser humano admirable, un ejemplo silencioso de fortaleza, ternura y determinación. Eres luz en mi vida, y desde el primer día quise que lo supieras.

Deseo que, si algún día vuelves aquí —en una semana, en un mes o en un año— recuerdes rodearte siempre de personas que te celebren como yo te celebro hoy. No aceptes lo mínimo. No mereces nada básico. Eres extraordinaria, y solo cosas extraordinarias deberían encontrarte.

Te quiero, te admiro y te amo. Y mientras la vida me lo permita, quiero apoyarte, cuidarte, mimarte y acompañarte incluso en tus caprichos, ideas locas y ocurrencias inesperadas.

Feliz cumpleaños a la Catalina con botitas rojas.
Feliz cumpleaños a la Catalina de los pucheros fotografiados.
Feliz cumpleaños a la Catalina que llegaba tarde al colegio y aun así seguía brillando.
Feliz cumpleaños a la Catalina que repitió tres veces el mismo año y jamás dejó que eso definiera su valor.
Feliz cumpleaños a la Catalina que resistió no una, sino tres decepciones amorosas.
Feliz cumpleaños a la Catalina que fue poliamada sin merecer confusión.
Feliz cumpleaños a la Catalina que intentaron usar y aun así siguió creyendo en el amor.
Feliz cumpleaños a la Catalina que se tinturó el cabello para cerrar ciclos.
Feliz cumpleaños a la Catalina que tuvo su primera borrachera en casa.
Feliz cumpleaños a la Catalina que atravesó injusticias que nunca debieron tocarla.
Feliz cumpleaños a la Catalina que hizo su tesis con su ex (sí, esa misma).
Feliz cumpleaños a la Catalina que eligió convertir a Sarhy e Isabella en hermanas de vida.
Feliz cumpleaños a la Catalina que necesitó el apoyo del mundo cuando su papá partió a Estados Unidos.
Feliz cumpleaños a la Catalina que lloró cuando Vainilla se volvió una estrella.
Feliz cumpleaños a la Catalina que conocí hace más de un año en un lugar inesperado.
Feliz cumpleaños a la Catalina que habla con perritos y me enamora con eso.
Feliz cumpleaños a la Catalina que me desespera diez minutos explicando algo que podría explicar en dos.
Feliz cumpleaños a la Catalina de los audios infinitos.
Feliz cumpleaños a la Catalina de las selfies espontáneas.
Feliz cumpleaños a la Catalina que comenta hasta el más mínimo detalle que le comparto.

Y, sobre todo, feliz cumpleaños a todas las Catalinas que existen en este universo y en todas las dimensiones posibles.

Gracias por ser refugio.
Gracias por ser luz.
Gracias por ser hogar.`;


let i=0;
let carta=document.getElementById("carta");
let started=false;

function typeWriter(){
  if(i<texto.length){
    carta.innerHTML+=texto.charAt(i);
    i++;
    setTimeout(typeWriter,25);
  }
}

window.addEventListener("scroll",()=>{
  const cartaPos=document.getElementById("cartaSection").getBoundingClientRect().top;
  if(cartaPos<window.innerHeight/1.3 && !started){
    started=true;
    typeWriter();
  }
});

/* MÚSICA AMBIENTAL SUAVE */

let audioCtx;
let musicStarted = false;

function startMusic() {
  if (!musicStarted) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicStarted = true;
    playLoop();
  }
}

function playNote(freq, duration, delay = 0) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  const now = audioCtx.currentTime + delay;

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.05, now + 0.5); // fade in
  gain.gain.linearRampToValueAtTime(0, now + duration); // fade out

  osc.start(now);
  osc.stop(now + duration);
}

function playLoop() {
  if (!musicStarted) return;

  // Notas suaves tipo piano (A menor ambiente)
  playNote(220, 3, 0);      // A3
  playNote(329.63, 3, 3.5); // E4
  playNote(261.63, 3, 7);   // C4
  playNote(293.66, 3, 10.5);// D4

  setTimeout(playLoop, 14000);
}

document.body.addEventListener("click", startMusic, { once: true });
let fotosAbiertas = false;

function toggleFotos() {
  const extras = document.querySelectorAll(".extra");
  const boton = document.querySelector(".ver-mas-btn");

  fotosAbiertas = !fotosAbiertas;

  extras.forEach(foto => {
    if (fotosAbiertas) {
      foto.classList.add("show");
    } else {
      foto.classList.remove("show");
    }
  });

  boton.textContent = fotosAbiertas 
    ? "Ver menos recuerdos" 
    : "Ver más recuerdos";
}

  /* COUNTDOWN FUNCTION */
function startCountdown(targetDate, elementId) {
  const countDate = new Date(targetDate).getTime();

  setInterval(function() {
    const now = new Date().getTime();
    const gap = countDate - now;

    const days = Math.floor(gap / (1000 * 60 * 60 * 24));
    const hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));

    if (gap > 0) {
      document.getElementById(elementId).innerHTML =
        days + " días " + hours + "h " + minutes + "m";
    } else {
      document.getElementById(elementId).innerHTML = "Es hoy 💛";
    }
  }, 1000);
}

/* FECHAS */
startCountdown("May 18, 2026 00:00:00", "aniversarioCountdown");
startCountdown("August 15, 2026 00:00:00", "moratCountdown");


/* BOTÓN FRASES CON ANIMACIÓN SUAVE */
const loveMessages = [

  "Eres hogar.",

document.getElementById("loveButton").addEventListener("click", function() {

  messageElement.classList.remove("show");

  setTimeout(() => {
    messageElement.innerText = random;
    messageElement.classList.add("show");
  }, 200);
});
</script>
