<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21.03.2026</title>

<style>
body{
margin:0;
background:#000;
color:#eaeaea;
font-family: 'Helvetica Neue', sans-serif;
overflow-x:hidden;
}

/* Pantallas */
.screen{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:#000;
transition:opacity .8s ease;
}

.screen.active{
display:flex;
}

/* Countdown */
.counter{
font-size:3rem;
letter-spacing:3px;
margin-top:20px;
}

.counter span{
margin:0 10px;
}

.subtitle{
font-size:1.2rem;
color:#fff3b0;
margin-bottom:30px;
max-width:600px;
line-height:1.6;
}

/* Password */
input{
background:transparent;
border:none;
border-bottom:1px solid #fff3b0;
color:#fff;
font-size:1.2rem;
text-align:center;
padding:10px;
outline:none;
width:200px;
}

button{
margin-top:20px;
padding:8px 20px;
background:#fff3b0;
border:none;
cursor:pointer;
transition:.3s;
}

button:hover{
opacity:.8;
}

#errorMessage{
margin-top:15px;
font-size:.9rem;
color:#fff3b0;
min-height:20px;
}

/* Contenido principal */
#mainContent{
opacity:0;
transition:opacity 1.2s ease;
padding:120px 20px;
text-align:center;
}

.polaroid{
width:220px;
background:#111;
padding:10px 10px 30px 10px;
margin:40px auto;
opacity:0;
transform:translateY(40px) rotate(var(--r));
transition:all 1.2s ease;
}

.polaroid img{
width:100%;
display:block;
}

.polaroid.show{
opacity:1;
transform:translateY(0) rotate(var(--r));
}
</style>
</head>

<body>

<!-- COUNTDOWN -->
<div id="countdownScreen" class="screen active">
<div class="subtitle">
Hay momentos que solo se abren para quien presta atención.
<br><br>
Prepárate para el reto que está a punto de comenzar.
</div>
<div class="counter">
<span id="days">0</span>d
<span id="hours">0</span>h
<span id="minutes">0</span>m
<span id="seconds">0</span>s
</div>
</div>

<!-- PASSWORD -->
<div id="passwordScreen" class="screen">
<div class="subtitle">
¿Cuál es la hora exacta de la primera foto que tomé relacionada contigo?
</div>
<input id="passwordInput" type="text" placeholder="00:00">
<button onclick="checkPassword()">Desbloquear</button>
<div id="errorMessage"></div>
</div>

<!-- CONTENIDO -->
<div id="mainContent">
<div id="photoContainer"></div>
</div>

<script>
const preview = new URLSearchParams(window.location.search).get("preview");
const targetDate = new Date("2026-03-21T00:00:00-05:00").getTime();
const now = new Date().getTime();

const countdownScreen=document.getElementById("countdownScreen");
const passwordScreen=document.getElementById("passwordScreen");
const mainContent=document.getElementById("mainContent");

function showScreen(screen){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
screen.classList.add("active");
}

/* CONTROL INICIAL */
if(preview==="true"){
showScreen(passwordScreen);
}
else if(now>=targetDate){
showScreen(passwordScreen);
}
else{
showScreen(countdownScreen);
startCountdown();
}

/* COUNTDOWN */
function startCountdown(){
const interval=setInterval(()=>{
const current=new Date().getTime();
const distance=targetDate-current;

if(distance<=0){
clearInterval(interval);
showScreen(passwordScreen);
}

document.getElementById("days").innerText=Math.floor(distance/(1000*60*60*24));
document.getElementById("hours").innerText=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerText=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerText=Math.floor((distance%(1000*60))/1000);
},1000);
}

/* PASSWORD */
const messages=[
"No exactamente.",
"Casi.",
"Piensa con precisión.",
"Recuerda bien.",
"La memoria también tiene detalles.",
"Observa mejor.",
"No es casualidad."
];
let errorIndex=0;

function checkPassword(){
const input=document.getElementById("passwordInput").value.trim();
if(input==="20:13"){
unlock();
}else{
document.getElementById("errorMessage").innerText=messages[errorIndex%messages.length];
errorIndex++;
}
}

function unlock(){
passwordScreen.style.opacity="0";
setTimeout(()=>{
passwordScreen.style.display="none";
mainContent.style.opacity="1";
revealPhotos();
},800);
}

/* FOTOS */
function revealPhotos(){
const container=document.getElementById("photoContainer");
for(let i=1;i<=33;i++){
const div=document.createElement("div");
div.className="polaroid";
div.style.setProperty("--r",Math.floor(Math.random()*6-3)+"deg");
div.innerHTML=`<img src="img/${String(i).padStart(2,'0')}.jpg">`;
container.appendChild(div);
}

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
},{threshold:0.2});

document.querySelectorAll(".polaroid").forEach(p=>observer.observe(p));
}
</script>

</body>
</html>
